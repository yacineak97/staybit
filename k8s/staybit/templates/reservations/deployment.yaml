apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: reservations
  name: reservations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservations
  template:
    metadata:
      labels:
        app: reservations
    spec:
      containers:
        - image: 566778529020.dkr.ecr.eu-north-1.amazonaws.com/reservations:latest
          name: reservations
          env:
            - name: POSTGRES_HOST
              value: 'ep-fancy-boat-aq4bbi1z-pooler.c-8.us-east-1.aws.neon.tech'
            - name: POSTGRES_DB
              value: 'neondb'
            - name: POSTGRES_PORT
              value: '5432'
            - name: POSTGRES_USER
              value: 'neondb_owner'
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: postgresPassword
            - name: POSTGRES_SYNCHRONIZE
              value: 'true'
            - name: PORT
              value: '3000'
            - name: AUTH_HOST
              value: auth-tcp
            - name: AUTH_PORT
              value: '3002'
            - name: PAYMENTS_HOST
              value: payments-tcp
            - name: PAYMENTS_PORT
              value: '3003'
          ports:
            - containerPort: 3000

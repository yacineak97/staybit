apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: notifications
  name: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - image: 566778529020.dkr.ecr.eu-north-1.amazonaws.com/notifications:latest
          name: notifications
          env:
            - name: PORT
              value: '3004'
            - name: GOOGLE_OAUTH_CLIENT_ID
              value: 406766149857-aoro82et1o0acf1i0g7epept9u2jf97v.apps.googleusercontent.com
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google
                  key: clientSecret
            - name: GOOGLE_OAUTH_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: google-refresh-token
                  key: refreshToken
            - name: SMTP_USER
              value: yacine.akli97@gmail.com
          ports:
            - containerPort: 3004

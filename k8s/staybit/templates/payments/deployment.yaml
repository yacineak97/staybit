apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: payments
  name: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - image: 566778529020.dkr.ecr.eu-north-1.amazonaws.com/payments:latest
          name: payments
          env:
            - name: PORT_TCP
              value: '3003'
            - name: PORT_HTTP
              value: '3005'
            - name: NOTIFICATIONS_HOST
              value: notifications
            - name: NOTIFICATIONS_PORT
              value: '3004'
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-api-key
                  key: apiKeyStripe
          ports:
            - containerPort: 3003
            - containerPort: 3005

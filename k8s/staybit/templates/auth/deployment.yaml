apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: auth
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - image: 566778529020.dkr.ecr.eu-north-1.amazonaws.com/auth:latest
          name: auth
          env:
            - name: POSTGRES_HOST
              value: 'ep-fancy-boat-aq4bbi1z-pooler.c-8.us-east-1.aws.neon.tech'
            - name: POSTGRES_DB
              value: 'neondb'
            - name: POSTGRES_PORT
              value: '5432'
            - name: POSTGRES_USER
              value: 'neondb_owner'
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: postgresPassword
            - name: POSTGRES_SYNCHRONIZE
              value: 'true'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt
                  key: jwtSecret
            - name: JWT_EXPIRATION
              value: '3600'
            - name: TCP_PORT
              value: '3002'
            - name: HTTP_PORT
              value: '3001'
          ports:
            - containerPort: 3002
            - containerPort: 3001
